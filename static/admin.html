<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GateGuard — Kamera Yönetimi</title>
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="/static/tailwind.js"></script>
    <style>
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<header class="bg-gray-900 border-b border-gray-800 px-4 py-2 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <a href="/" class="text-gray-500 hover:text-gray-300 text-sm">← Ana Panel</a>
        <div class="w-px h-5 bg-gray-700"></div>
        <h1 class="text-lg font-bold">⚙️ Kamera Yönetimi</h1>
    </div>
    <div class="flex gap-2">
        <a href="/night-watch" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded border border-gray-700">🌙 Gece İzleme</a>
        <a href="/zone-editor" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded border border-gray-700">🎯 Bölgeler</a>
    </div>
</header>

<main class="p-4 max-w-5xl mx-auto space-y-4">

    <!-- Add camera form -->
    <section class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <h2 class="font-bold mb-3">Yeni Kamera Ekle</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
            <input id="new-name" placeholder="İsim (örn. Bahçe Arka)"
                   class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
            <input id="new-location" placeholder="Konum (opsiyonel)"
                   class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
            <input id="new-rtsp" placeholder="rtsp://admin:SIFRE@192.168.1.x:554/..."
                   class="md:col-span-2 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm font-mono">
            <select id="new-role" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
                <option value="intrusion">Hırsızlık Tespiti (Modül 2)</option>
                <option value="plate">Plaka Tespiti (Modül 1)</option>
                <option value="both">Her İkisi</option>
            </select>
            <label class="flex items-center gap-2 text-sm bg-gray-800 border border-gray-700 rounded px-3 py-2">
                <input type="checkbox" id="new-enabled" checked>
                <span>Etkin</span>
            </label>
        </div>
        <button onclick="createCamera()"
                class="mt-3 w-full bg-cyan-700 hover:bg-cyan-600 text-white py-2 rounded-lg font-semibold transition">
            ➕ Kamera Ekle
        </button>
    </section>

    <!-- Camera list -->
    <section>
        <h2 class="font-bold mb-3">Kayıtlı Kameralar</h2>
        <div id="cam-list" class="space-y-2">
            <div class="text-center py-8 text-gray-500 text-sm">Yükleniyor...</div>
        </div>
    </section>
</main>

<!-- Edit modal -->
<div id="edit-modal" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4"
     onclick="if(event.target===this) this.classList.add('hidden')">
    <div class="bg-gray-900 border border-gray-700 rounded-xl max-w-md w-full">
        <div class="p-4 border-b border-gray-800 flex items-center justify-between">
            <h3 class="font-bold">Kamera Düzenle</h3>
            <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="text-gray-400 hover:text-white text-xl">✕</button>
        </div>
        <div class="p-4 space-y-2">
            <input id="edit-name" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
            <input id="edit-location" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
            <input id="edit-rtsp" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm font-mono">
            <select id="edit-role" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
                <option value="intrusion">Hırsızlık Tespiti</option>
                <option value="plate">Plaka Tespiti</option>
                <option value="both">Her İkisi</option>
            </select>
            <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" id="edit-enabled">
                <span>Etkin</span>
            </label>
            <button onclick="saveEdit()" class="w-full bg-cyan-700 hover:bg-cyan-600 text-white py-2 rounded-lg font-semibold transition">💾 Kaydet</button>
        </div>
    </div>
</div>

<!-- Test modal -->
<div id="test-modal" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4"
     onclick="if(event.target===this) this.classList.add('hidden')">
    <div class="bg-gray-900 border border-gray-700 rounded-xl max-w-2xl w-full">
        <div class="p-4 border-b border-gray-800 flex items-center justify-between">
            <h3 class="font-bold">Bağlantı Testi</h3>
            <button onclick="document.getElementById('test-modal').classList.add('hidden')" class="text-gray-400 hover:text-white text-xl">✕</button>
        </div>
        <div class="p-4">
            <div id="test-result" class="text-sm mb-3">⏳ Bağlanıyor...</div>
            <img id="test-img" class="w-full rounded-lg bg-black hidden" alt="">
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-4 right-4 space-y-2 z-40"></div>

<script>
let cameras = [];
let editingId = null;

async function loadCameras() {
    try {
        const r = await fetch('/api/cameras');
        cameras = await r.json();
        renderList();
    } catch { toast('Kameralar yüklenemedi', 'hata'); }
}

function renderList() {
    const host = document.getElementById('cam-list');
    if (!cameras.length) {
        host.innerHTML = '<div class="text-center py-8 text-gray-500 text-sm">Henüz kayıtlı kamera yok.</div>';
        return;
    }
    host.innerHTML = cameras.map(c => {
        const roleName = {plate:'Plaka', intrusion:'Hırsızlık', both:'Her İkisi'}[c.role] || c.role;
        const statusIcon = c.enabled
            ? (c.is_running ? '🟢' : '🟡')
            : '🔴';
        const statusText = c.enabled
            ? (c.is_running ? 'Çalışıyor' : 'Etkin ama motor yok')
            : 'Pasif';
        return `<div class="bg-gray-900 border border-gray-800 rounded-xl p-3">
            <div class="flex items-center justify-between flex-wrap gap-2">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <span>${statusIcon}</span>
                        <span class="font-semibold">${escapeHtml(c.name)}</span>
                        <span class="text-[10px] bg-gray-800 text-gray-400 px-1.5 py-0.5 rounded">${roleName}</span>
                    </div>
                    <div class="text-xs text-gray-500 mt-1">
                        ${escapeHtml(c.location || '-')} · ${statusText}
                    </div>
                    <div class="text-[10px] text-gray-600 font-mono mt-1 truncate">${escapeHtml(c.rtsp_url_masked || '')}</div>
                </div>
                <div class="flex gap-1 flex-shrink-0">
                    <button onclick="testConnection(${c.id})" class="text-xs bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded">📡 Test</button>
                    <button onclick="openEdit(${c.id})" class="text-xs bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded">✏️ Düzenle</button>
                    <button onclick="removeCamera(${c.id}, '${escapeHtml(c.name)}')" class="text-xs bg-red-900/60 hover:bg-red-800 text-red-300 px-2 py-1 rounded">🗑 Sil</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

async function createCamera() {
    const name = document.getElementById('new-name').value.trim();
    const rtsp = document.getElementById('new-rtsp').value.trim();
    if (!name || !rtsp) { toast('İsim ve RTSP URL gerekli', 'hata'); return; }

    const body = {
        name, rtsp_url: rtsp,
        location: document.getElementById('new-location').value.trim(),
        role: document.getElementById('new-role').value,
        enabled: document.getElementById('new-enabled').checked,
    };
    try {
        const r = await fetch('/api/cameras', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        toast('Kamera eklendi', 'basari');
        document.getElementById('new-name').value = '';
        document.getElementById('new-rtsp').value = '';
        document.getElementById('new-location').value = '';
        await loadCameras();
    } catch (e) { toast('Ekleme başarısız: ' + e.message, 'hata'); }
}

async function openEdit(cid) {
    // Re-fetch since list response masks the RTSP URL
    editingId = cid;
    const cam = cameras.find(c => c.id === cid);
    if (!cam) return;
    document.getElementById('edit-name').value = cam.name;
    document.getElementById('edit-location').value = cam.location || '';
    document.getElementById('edit-rtsp').value = cam.rtsp_url || '';  // full URL in admin view
    document.getElementById('edit-role').value = cam.role;
    document.getElementById('edit-enabled').checked = !!cam.enabled;
    document.getElementById('edit-modal').classList.remove('hidden');
}

async function saveEdit() {
    if (!editingId) return;
    const body = {
        name: document.getElementById('edit-name').value.trim(),
        rtsp_url: document.getElementById('edit-rtsp').value.trim(),
        location: document.getElementById('edit-location').value.trim(),
        role: document.getElementById('edit-role').value,
        enabled: document.getElementById('edit-enabled').checked,
    };
    try {
        const r = await fetch(`/api/cameras/${editingId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        document.getElementById('edit-modal').classList.add('hidden');
        toast('Güncellendi', 'basari');
        await loadCameras();
    } catch (e) { toast('Güncelleme başarısız: ' + e.message, 'hata'); }
}

async function removeCamera(cid, name) {
    if (!confirm(`"${name}" kamerasını silmek istediğinize emin misiniz? Bölgeleri de silinecek.`)) return;
    try {
        await fetch(`/api/cameras/${cid}`, { method: 'DELETE' });
        toast('Kamera silindi', 'basari');
        await loadCameras();
    } catch { toast('Silme başarısız', 'hata'); }
}

async function testConnection(cid) {
    const modal = document.getElementById('test-modal');
    modal.classList.remove('hidden');
    document.getElementById('test-result').innerHTML = '⏳ Bağlanıyor...';
    document.getElementById('test-img').classList.add('hidden');

    try {
        const r = await fetch(`/api/cameras/${cid}/test`, { method: 'POST' });
        const d = await r.json();
        let result = '';
        if (d.connected) {
            result = '<div class="text-green-400 font-semibold">✓ Bağlantı başarılı</div>';
            if (d.frame_size) {
                result += `<div class="text-xs text-gray-400 mt-1">Çözünürlük: ${d.frame_size.width}×${d.frame_size.height}</div>`;
            }
        } else {
            result = '<div class="text-red-400 font-semibold">✗ Bağlanılamadı</div>';
        }
        if (d.error) result += `<div class="text-xs text-gray-500 mt-1">${escapeHtml(d.error)}</div>`;
        document.getElementById('test-result').innerHTML = result;

        // Show snapshot if orchestrator has a stream
        if (d.connected && d.frame_size) {
            const img = document.getElementById('test-img');
            img.src = `/api/cameras/${cid}/snapshot?t=${Date.now()}`;
            img.onload = () => img.classList.remove('hidden');
        }
    } catch (e) {
        document.getElementById('test-result').innerHTML =
            `<div class="text-red-400">Hata: ${escapeHtml(e.message)}</div>`;
    }
}

function escapeHtml(s) {
    const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
}

function toast(msg, tip='bilgi') {
    const c = document.getElementById('toast');
    const cls = { basari: 'bg-green-900/70 border-green-700 text-green-300',
                  hata:   'bg-red-900/70 border-red-700 text-red-300',
                  bilgi:  'bg-blue-900/70 border-blue-700 text-blue-300' };
    const el = document.createElement('div');
    el.className = `p-3 rounded-lg border text-sm ${cls[tip] || cls.bilgi}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(), 300); }, 3500);
}

loadCameras();
</script>
</body>
</html>
